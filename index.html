<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>İpek & Sezer – Düğün Daveti</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
    }

    body {
      font-family: 'Cormorant Garamond', 'EB Garamond', Georgia, serif;
      position: relative;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
    }

    /* ── Background Image ── */
    .bg {
      position: fixed;
      inset: 0;
      background-image: url('davetiye.png');
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
      z-index: 0;
    }

    /* subtle vignette to ground the buttons */
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        transparent 55%,
        rgba(30, 20, 10, 0.18) 75%,
        rgba(20, 12, 4, 0.38) 100%
      );
    }

    /* ── Button Container ── */
    .btn-wrapper {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 14px;
      padding: 0 22px 5.5vh;
      /* sits ~15-20% from the bottom */
      padding-bottom: clamp(28px, 6vh, 72px);
    }

    /* ── Buttons ── */
    .btn {
      flex: 1;
      max-width: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;

      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(13px, 3.8vw, 17px);
      font-weight: 400;
      letter-spacing: 0.045em;
      color: #4a3219;
      text-decoration: none;
      white-space: nowrap;

      padding: 12px 10px;
      border-radius: 40px;

      /* bohem yarı-şeffaf cam efekti */
      background: rgba(255, 250, 242, 0.68);
      border: 1.5px solid rgba(172, 131, 74, 0.70);
      backdrop-filter: blur(10px) saturate(1.4);
      -webkit-backdrop-filter: blur(10px) saturate(1.4);

      box-shadow:
        0 2px 18px rgba(140, 100, 40, 0.18),
        inset 0 1px 0 rgba(255,255,255,0.55);

      cursor: pointer;
      transition:
        transform 0.18s cubic-bezier(.34,1.56,.64,1),
        background 0.18s ease,
        box-shadow 0.18s ease;

      /* entrance animation */
      opacity: 0;
      animation: fadeUp 0.7s ease forwards;
    }

    .btn:nth-child(1) { animation-delay: 0.15s; }
    .btn:nth-child(2) { animation-delay: 0.30s; }

    .btn .emoji {
      font-size: 1.1em;
      line-height: 1;
    }

    /* hover */
    .btn:hover {
      background: rgba(255, 248, 235, 0.85);
      border-color: rgba(172, 131, 74, 1);
      box-shadow:
        0 4px 24px rgba(140, 100, 40, 0.28),
        inset 0 1px 0 rgba(255,255,255,0.7);
      transform: translateY(-2px) scale(1.03);
    }

    /* active / tap */
    .btn:active {
      transform: scale(0.93);
      background: rgba(240, 228, 208, 0.82);
      box-shadow: 0 1px 8px rgba(140, 100, 40, 0.18);
      transition-duration: 0.08s;
    }

    /* ── Entrance keyframes ── */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Very small screens: shrink font a touch ── */
    @media (max-height: 600px) {
      .btn-wrapper {
        padding-bottom: clamp(14px, 4vh, 32px);
        gap: 10px;
      }
      .btn {
        padding: 10px 8px;
      }
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <div class="btn-wrapper">
    <a class="btn" href="https://www.google.com/maps/place/Kali+Wedding+Antalya+(K%C4%B1r+bah%C3%A7esi,+After+Mekan,+D%C3%BC%C4%9F%C3%BCn+ve+T%C3%BCm+%C3%96zel+G%C3%BCnler)/@36.8301501,30.5689228,17.5z/data=!4m14!1m7!3m6!1s0x14c395c4d2e3d98f:0x2fd1059c6c8716c!2zS2FsaSBXZWRkaW5nIEFudGFseWEgKEvEsXIgYmFow6dlc2ksIEFmdGVyIE1la2FuLCBEw7zEn8O8biB2ZSBUw7xtIMOWemVsIEfDvG5sZXIp!8m2!3d36.8303288!4d30.5690928!16s%2Fg%2F11x2sy67dn!3m5!1s0x14c395c4d2e3d98f:0x2fd1059c6c8716c!8m2!3d36.8303288!4d30.5690928!16s%2Fg%2F11x2sy67dn?entry=ttu&g_ep=EgoyMDI2MDQwOC4wIKXMDSoASAFQAw%3D%3D" target="_blank" rel="noopener">
      <span class="emoji">📍</span> Haritada Gör
    </a>
    <a class="btn" href="https://docs.google.com/forms/d/e/1FAIpQLSfCjqvltanvw6h6eTp2KH7H5ccGUJZ-z4-kdF2gIUzYFMtmvA/viewform?embedded=true" target="_blank" rel="noopener">
      <span class="emoji">✅</span> Katılım Bildir
    </a>
  </div>

</body>
</html>
